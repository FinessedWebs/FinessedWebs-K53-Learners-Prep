<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>K53 Exam</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="exam-wrapper">

    <!-- START SCREEN -->
    <div id="start-screen">
        <h2>Start Exam</h2>

        <button class="btn" onclick="startExam(true)">Timed (60 min)</button>
        <button class="btn" onclick="startExam(false)">Practice Mode</button>
    </div>

    <!-- EXAM SCREEN -->
    <div id="exam-screen" style="display:none;">

        <div class="top-bar">
            <span id="category"></span>
            <span id="progress"></span>
            <span id="timer"></span>
        </div>

        <h2 id="question"></h2>

        <div id="options"></div>

        <button id="nextBtn" class="btn" style="display:none;" onclick="nextQuestion()">
            Next
        </button>

    </div>

</div>

<script src="js/exam.js"></script>
</body>
</html>
